<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Trabajo — Innovation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Mobile-first extras */
        .orden-card       { border-left: 4px solid #9166CC; border-radius: 10px; }
        .orden-card.urgente { border-left-color: #dc3545; }
        .fase-item        { border-radius: 8px; background: #f8f9fa; cursor: pointer; transition: background .15s; }
        .fase-item:hover  { background: #e8f5e9; }
        .fase-item.completada { background: #e8f5e9; }
        .btn-fase         { min-height: 48px; font-size: 1rem; }
        .foto-preview     { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .upload-area      { border: 2px dashed #9166CC; border-radius: 10px; cursor: pointer; }
        .upload-area:hover { background: #f7f5fc; }
        @media (max-width: 576px) {
            .btn-fase { min-height: 56px; font-size: 1.1rem; }
            .card-body { padding: 1rem; }
        }
    </style>
</head>
<body>
<!-- ======= NAVBAR ======= -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-3">
        <a class="navbar-brand" href="index.html">
            <img class="nav-logo" src="assets/logo-innovation.svg" alt="Innovation">
        </a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-1">
            <a class="nav-link active tecnico-only" href="tecnico.html" style="display:none"><i class="bi bi-person-badge me-1"></i>Mi Trabajo</a>
            <a class="nav-link cuadrilla-only" href="ordenes.html" style="display:none"><i class="bi bi-calendar-week me-1"></i>&Oacute;rdenes</a>
            <span class="nav-link text-light opacity-75 small" id="navUserName" style="font-size:.85rem"></span>
            <a class="nav-link logout-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
        </div>
    </div>
</nav>

<!-- ======= CONTENIDO ======= -->
<div class="container px-3 py-3" style="max-width:700px">

    <!-- Encabezado del d&iacute;a -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="fw-bold mb-0"><i class="bi bi-sun me-2 text-warning"></i>Mis &Oacute;rdenes</h4>
            <p class="text-muted mb-0 small" id="fechaHoy">Hoy</p>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="cargarMisOrdenes()">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </div>

    <!-- Filtro r&aacute;pido -->
    <div class="d-flex gap-2 mb-3 flex-wrap">
        <button class="btn btn-sm btn-primary active" id="filtroTodos" onclick="setFiltro('todos')">Todas</button>
        <button class="btn btn-sm btn-outline-warning" id="filtroAsignada" onclick="setFiltro('ASIGNADA')">Asignadas</button>
        <button class="btn btn-sm btn-outline-info"    id="filtroProgreso" onclick="setFiltro('EN_PROGRESO')">En Progreso</button>
        <button class="btn btn-sm btn-outline-success" id="filtroComp"    onclick="setFiltro('COMPLETADA')">Completadas</button>
    </div>

    <!-- Lista de &oacute;rdenes -->
    <div id="listaOrdenes">
        <div class="text-center py-5 text-muted">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Cargando tus &oacute;rdenes...</p>
        </div>
    </div>
</div>

<!-- ===== MODAL: Ejecutar orden ===== -->
<div class="modal fade" id="modalEjecutar" tabindex="-1">
    <div class="modal-dialog modal-fullscreen-sm-down modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ejecutarTitle">Ejecutar Orden</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pb-4" id="ejecutarBody">
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL: Subir foto ===== -->
<div class="modal fade" id="modalFoto" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-camera me-2"></i>Agregar Foto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">Toma una foto o selecciona desde tu galer&iacute;a.</p>
                <!-- capture="environment" activa la c&aacute;mara trasera en m&oacute;vil -->
                <input type="file" class="form-control" id="inputFoto"
                       accept="image/*" capture="environment">
                <div class="mt-3" id="previewFoto"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary btn-lg" onclick="subirFoto()">
                    <i class="bi bi-cloud-upload me-1"></i>Subir Foto
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL: Cerrar orden ===== -->
<div class="modal fade" id="modalCerrar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-flag-fill me-2 text-success"></i>Cerrar Orden</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>¿Confirmas que el trabajo est&aacute; <strong>completado</strong> y listo para validaci&oacute;n del jefe?</p>
                <div class="mb-3">
                    <label class="form-label">Observaciones finales</label>
                    <textarea class="form-control" id="cerrarObs" rows="3"
                              placeholder="Describe el trabajo realizado, materiales usados, incidencias..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-success btn-lg" onclick="confirmarCierre()">
                    <i class="bi bi-check-circle me-1"></i>Cerrar y Enviar a Validaci&oacute;n
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js?v=20260530-4"></script>
<script src="js/tecnico.js"></script>
</body>
</html>
