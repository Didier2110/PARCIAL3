<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Innovation Telecomunicaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo Innovation -->
            <div class="brand-logo">
                <img class="login-logo" src="assets/logo-innovation.svg" alt="Innovation">
            </div>

            <div class="login-header">
                <p>Sistema de Gesti&oacute;n ISP &mdash; Inicia sesi&oacute;n para continuar</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electr&oacute;nico</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="correo@empresa.com" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contrase&ntilde;a</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="********" required>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesi&oacute;n</button>
            </form>

            <div id="errorMessage" class="alert alert-danger mt-3" style="display:none;"></div>
        </div>

        <p class="login-footer">&copy; 2026 Innovation Telecomunicaciones S.A.S.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js?v=20260530-4"></script>
    <script src="js/login.js"></script>
</body>
</html>
