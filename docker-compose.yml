version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: innovation_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: innovation_telecom
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: innovation_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017
      SPRING_DATA_MONGODB_DATABASE: innovation_telecom
      SERVER_PORT: 8080
    depends_on:
      - mongodb
    links:
      - mongodb

volumes:
  mongo_data:
